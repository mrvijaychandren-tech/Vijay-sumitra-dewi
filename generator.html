i<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Generator Link Undangan</title>

<style>

body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:30px;
}

input{
    width:90%;
    max-width:400px;
    padding:15px;
    font-size:18px;
    border-radius:10px;
    border:none;
}

button{
    margin-top:15px;
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:gold;
    cursor:pointer;
}

#hasil{
    margin-top:25px;
    word-break:break-all;
    color:#00ff99;
}

</style>

</head>

<body>
<div style="margin-bottom:20px;">

<img src="Pengantin.png"
style="
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid gold;
box-shadow:0 0 20px gold;
">

<h2 style="
margin-top:15px;
color:#ffd700;
font-family:cursive;
">
Vijay ❤️ Sumitra
</h2>

</div>
<h1>Generator Link Undangan</h1>

<input
id="nama"
placeholder="Masukkan Nama Tamu">

<br>

<button onclick="buatLink()">
Buat Link
</button>

<div id="hasil"></div>

<script>

function buatLink(){

    const nama = document.getElementById("nama").value;

    const link = "https://mrvijaychandren-tech.github.io/Vijay-sumitra-dewi/?to=" + encodeURIComponent(nama);

    document.getElementById("hasil").innerHTML = `
        <input
            value="${link}"
            readonly
            style="
                width:90%;
                padding:12px;
                margin-top:20px;
                border-radius:10px;
                font-size:16px;
            ">

        <br><br>

        <button onclick="copyLink('${link}')">
            📋 Copy Link
        </button>

        <button onclick="window.open('${link}','_blank')">
            👁️ Lihat Undangan
        </button>

        <br><br>

        <a href="https://wa.me/?text=${encodeURIComponent(link)}">
            <button>
                📲 Kirim WhatsApp
            </button>
        </a>
    `;
}

function copyLink(link){

navigator.clipboard.writeText(link);

alert("Link berhasil disalin.");

}

</script>

</body>
</html>
